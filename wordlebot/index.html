nherit;transition:opacity .1s}button:hover{opacity:.85}.btn-green{background:#6ca965;color:#fff}.btn-gray{background:#878a8c;color:#fff}.btn-yellow{background:#c8b653;color:#fff}.btn-reset{background:#f0f0f0;color:#555;border:1px solid #ccc}.mode-toggle{display:flex;align-items:center;gap:8px;margin-bottom:4px}.toggle-label{font-size:.85rem;font-weight:700;color:#555}input[type="checkbox"]{width:15px;height:15px;cursor:pointer}.color-hint-row{font-size:.78rem;color:#777;line-height:1.7}.swatch{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:middle;margin:0 1px}.wb-suggestions{flex:1;min-width:0}.remaining-header{font-size:1rem;margin-bottom:10px;color:#333}.remaining-header strong{font-size:1.2rem}.computed-badge{font-size:.7rem;background:#f0f0f0;color:#888;padding:2px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}.section-label{font-size:.78rem;font-weight:700;letter-spacing:1px;color:#888;text-transform:uppercase;margin:10px 0 5px}.suggestion-list{display:flex;flex-direction:column;gap:3px;max-height:420px;overflow-y:auto}.suggestion-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;border:1px solid transparent}.suggestion-item.is-sol{background:#f0faf0;border-color:#c3e8c3}.sugg-rank{font-size:.75rem;color:#aaa;width:20px;text-align:right;flex-shrink:0}.sugg-word{font-weight:800;letter-spacing:1px;font-size:.95rem;width:60px;flex-shrink:0}.sugg-score{font-size:.8rem;color:#777;width:40px;flex-shrink:0}.badge{font-size:.65rem;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0}.badge-sol{background:#6ca965;color:#fff}.badge-past{background:#878a8c;color:#fff}.challenge-score{margin:8px 0;padding:12px 14px;border-radius:6px;background:#f8f8f8;border:1px solid #e0e0e0;font-size:.95rem;line-height:1.6}.challenge-score .pct{font-size:1.4rem;font-weight:800}.challenge-score .rank-line{font-size:.8rem;color:#888;margin-top:2px}details.rem-details{margin-top:10px;font-size:.82rem;color:#555}details.rem-details summary{cursor:pointer;color:#6ca965;font-weight:700}.rem-words{margin-top:6px;line-height:1.8;color:#333}.hint-text{font-size:.88rem;color:#888}.no-solutions{color:#c0392b;font-size:.9rem}.solved-msg{font-size:1.2rem;font-weight:700;color:#6ca965}.error-msg{font-size:.85rem;color:#c0392b}.loading-msg{font-size:.88rem;color:#888;font-style:italic}hr.divider{border:0;border-top:1px solid #e8e8e8;margin:10px 0}</style> </head> <body> <div class="wb-wrap"> <div class="wb-header"> <h1>Wordle Bot</h1> <p>Enter your guesses and the colors Wordle gave you — get optimal next-guess suggestions.</p> </div> <div class="wb-main"> <div class="wb-board"> <div class="grid" id="grid"></div> <div class="controls"> <div class="ctrl-row mode-toggle"> <label class="toggle-label">Mode:</label> <label> <input type="radio" name="mode" value="solver" checked onchange="onModeChange()"> Solver </label> <label> <input type="radio" name="mode" value="challenge" onchange="onModeChange()"> Challenge </label> </div> <div class="ctrl-row" id="startWordRow"> <label>Start with:</label> <select id="startWordSelect" onchange="onStartWordChange(this.value)"> <option value="raise">RAISE</option> <option value="arise">ARISE</option> <option value="adieu">ADIEU</option> <option value="custom">Custom…</option> </select> </div> <div class="ctrl-row" id="inputRow"> <input type="text" id="wordInput" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="WORD"> <button class="btn-green" onclick="submitWord()">Enter</button> </div> <div class="ctrl-row" id="colorRow" style="display:none;"> <button class="btn-green" id="confirmBtn" onclick="confirmColors()">Get Suggestions</button> <button class="btn-gray" onclick="undoWord()">← Undo</button> </div> <div class="color-hint-row" id="colorHint" style="display:none;"> Click tiles to cycle: <span class="swatch" style="background:#787c7f"></span> gray → <span class="swatch" style="background:#c8b653"></span> yellow → <span class="swatch" style="background:#6ca965"></span> green </div> <hr class="divider"> <div class="ctrl-row"> <label> <input type="checkbox" id="excludeUsed" onchange="onOptionChange()"> Exclude past NYT solutions </label> </div> <div class="ctrl-row"> <button class="btn-reset" onclick="resetGame()">Reset</button> </div> </div> </div> <div class="wb-suggestions" id="suggestionsPanel"> <p class="loading-msg" id="loadingMsg">Loading word data…</p> </div> </div> </div> <script>
"use strict";

// ── State ──────────────────────────────────────────────────────────────────
let gameData      = null;   // loaded from precomputed.json
let guessHistory  = [];     // [{word, colors:[0-2,…]}, …]  — confirmed guesses
let pendingWord   = null;   // word typed, awaiting color selection
let pendingColors = null;   // [0,0,0,0,0]  0=gray 1=yellow 2=green
let appMode       = 'solver'; // 'solver' | 'challenge'

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  document.getElementById('wordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitWord();
  });
  loadData();
});

async function loadData() {
  try {
    const resp = await fetch('precomputed.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    gameData = await resp.json();
    // Pre-fill the starting word
    onStartWordChange(document.getElementById('startWordSelect').value);
    setPanel('<p class="hint-text">Ready. Type your first guess and press Enter.</p>');
  } catch(err) {
    setPanel(`<p class="error-msg">⚠ Could not load precomputed.json: ${err.message}</p>`);
  }
}

// ── Grid construction ──────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

// ── Word input ─────────────────────────────────────────────────────────────
function submitWord() {
  if (!gameData) return;
  const input = document.getElementById('wordInput');
  const word  = input.value.toLowerCase().replace(/[^a-z]/g, '');
  if (word.length !== 5) { alert('Please enter a 5-letter word.'); return; }
  if (guessHistory.length >= 6) return;

  pendingWord   = word;
  pendingColors = [0, 0, 0, 0, 0]; // default all gray

  const row = guessHistory.length;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${row}-${c}`);
    tile.textContent  = word[c].toUpperCase();
    tile.className    = 'tile has-letter clickable gray';
    tile.dataset.color = '0';
    tile.onclick = () => cycleTile(row, c);
  }

  input.value = '';
  document.getElementById('inputRow').style.display  = 'none';
  document.getElementById('colorRow').style.display  = 'flex';
  document.getElementById('colorHint').style.display = 'block';

  // Update confirm button label for challenge mode
  document.getElementById('confirmBtn').textContent =
    appMode === 'challenge' ? 'Score My Guess' : 'Get Suggestions';
}

// Cycle a tile through gray → yellow → green → gray
function cycleTile(row, col) {
  const tile  = document.getElementById(`tile-${row}-${col}`);
  const names = ['gray', 'yellow', 'green'];
  let   c     = (parseInt(tile.dataset.color) + 1) % 3;
  tile.dataset.color = String(c);
  tile.className = `tile has-letter clickable ${names[c]}`;
  pendingColors[col] = c;
}

// ── Confirm colors ─────────────────────────────────────────────────────────
function confirmColors() {
  if (!pendingWord) return;
  const row    = guessHistory.length;
  const colors = [...pendingColors];

  // Lock tiles
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${row}-${c}`);
    tile.className = tile.className.replace(' clickable', '');
    tile.onclick   = null;
  }

  guessHistory.push({ word: pendingWord, colors });
  pendingWord = pendingColors = null;

  document.getElementById('colorRow').style.display  = 'none';
  document.getElementById('colorHint').style.display = 'none';
  document.getElementById('inputRow').style.display  = 'flex';

  // Check all-green (solved)
  if (colors.every(c => c === 2)) {
    setPanel(`<p class="solved-msg">🎉 Solved in ${guessHistory.length}!</p>`);
    return;
  }

  if (appMode === 'challenge') {
    showChallengeScore(guessHistory);
  } else {
    showSuggestions(guessHistory);
  }
}

function undoWord() {
  if (!pendingWord) return;
  const row = guessHistory.length;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${row}-${c}`);
    tile.textContent = ''; tile.className = 'tile'; tile.onclick = null;
    delete tile.dataset.color;
  }
  pendingWord = pendingColors = null;
  document.getElementById('colorRow').style.display  = 'none';
  document.getElementById('colorHint').style.display = 'none';
  document.getElementById('inputRow').style.display  = 'flex';
  document.getElementById('wordInput').focus();
}

// ── Solver mode: suggestions ───────────────────────────────────────────────
function showSuggestions(history) {
  const excludeUsed = document.getElementById('excludeUsed').checked;
  const result      = computeResult(history, excludeUsed);
  const panel       = document.getElementById('suggestionsPanel');

  const { remainingWords: rw, suggestions, fromCache } = result;

  if (rw.length === 0) {
    setPanel('<p class="no-solutions">No matching solutions found — check your color inputs.</p>');
    return;
  }

  let html = '';

  // Remaining count
  if (rw.length === 1) {
    html += `<p class="remaining-header">🎉 Only one solution left: <strong>${rw[0].toUpperCase()}</strong>!</p>`;
  } else {
    html += `<p class="remaining-header">
               <strong>${rw.length}</strong> solution${rw.length>1?'s':''} remaining
               ${fromCache ? '' : '<span class="computed-badge">live</span>'}
             </p>`;
  }

  // Top suggestions
  if (suggestions.length > 0 && rw.length > 1) {
    html += '<div class="section-label">Top guesses</div>';
    html += '<div class="suggestion-list">';
    suggestions.forEach((g, i) => {
      const solClass = g.sol ? ' is-sol' : '';
      const solBadge  = g.sol  ? '<span class="badge badge-sol">SOL</span>'   : '';
      const pastBadge = g.used ? '<span class="badge badge-past">PAST</span>' : '';
      html += `<div class="suggestion-item${solClass}">
        <span class="sugg-rank">${i+1}</span>
        <span class="sugg-word">${g.w.toUpperCase()}</span>
        <span class="sugg-score">${g.s.toFixed(2)}</span>
        ${solBadge}${pastBadge}
      </div>`;
    });
    html += '</div>';
  }

  // Expandable remaining solutions list
  if (rw.length >= 2 && rw.length <= 60) {
    html += `<details class="rem-details">
      <summary>${rw.length} possible solutions</summary>
      <div class="rem-words">${rw.map(w=>w.toUpperCase()).join(', ')}</div>
    </details>`;
  } else if (rw.length > 60) {
    html += `<p style="font-size:0.8rem;color:#aaa;margin-top:8px;">${rw.length} solutions — narrow down further to see them listed</p>`;
  }

  setPanel(html);
}

// ── Challenge mode: score a guess ─────────────────────────────────────────
function showChallengeScore(history) {
  const excludeUsed = document.getElementById('excludeUsed').checked;

  // Get state BEFORE this most recent guess
  const prevHistory   = history.slice(0, -1);
  const lastGuess     = history[history.length - 1];
  const prevResult    = computeResult(prevHistory, excludeUsed);
  const currentResult = computeResult(history,     excludeUsed);

  const before = prevResult.remainingWords;
  const after  = currentResult.remainingWords;

  if (before.length === 0) { setPanel('<p class="hint-text">No solutions to compare.</p>'); return; }

  const pctElim = ((before.length - after.length) / before.length * 100).toFixed(1);
  const avgAfter = scoreGuess(lastGuess.word, before).toFixed(2);

  // Rank this guess among all guesses (top 50 check for speed)
  // Find position in full ranked list — do this only if solution count is manageable
  let rankLine = '';
  if (before.length <= 200 && gameData) {
    const allWords  = gameData.meta.allWords;
    const myScore   = parseFloat(avgAfter);
    let betterCount = 0;
    for (const w of allWords) {
      if (scoreGuess(w, before) < myScore) betterCount++;
    }
    const rank = betterCount + 1;
    rankLine = `<div class="rank-line">Ranks #${rank.toLocaleString()} of ${allWords.length.toLocaleString()} possible guesses</div>`;
  }

  let color = after.length === 0 ? '#6ca965'
            : pctElim >= 80      ? '#6ca965'
            : pctElim >= 50      ? '#c8b653'
            :                      '#787c7f';

  const html = `
    <p class="remaining-header" style="margin-bottom:8px;">
      <strong>${before.length}</strong> → <strong>${after.length}</strong> solutions
    </p>
    <div class="challenge-score">
      <div class="pct" style="color:${color}">${pctElim}%</div>
      <div style="font-size:0.82rem;color:#555;">of remaining solutions eliminated</div>
      <div style="font-size:0.82rem;color:#555;margin-top:4px;">
        Avg remaining if you had guessed this: <strong>${avgAfter}</strong>
      </div>
      ${rankLine}
    </div>
    ${after.length > 0 && after.length <= 30
      ? `<details class="rem-details">
           <summary>${after.length} solutions still possible</summary>
           <div class="rem-words">${after.map(w=>w.toUpperCase()).join(', ')}</div>
         </details>`
      : ''}
  `;
  setPanel(html);
}

// ── Core computation (tree lookup + live fallback) ─────────────────────────
function computeResult(history, excludeUsed) {
  if (!gameData || history.length === 0) {
    return { remainingWords: gameData ? [...gameData.meta.solutionWords] : [], suggestions: [], fromCache: false };
  }

  const usedSet  = new Set(gameData.meta.usedWords);
  const startWord = history[0].word;
  const tree      = gameData.trees[startWord];

  // Try precomputed tree
  let node = null;
  if (tree) {
    node = tree[history[0].colors.join('')] || null;
    for (let i = 1; i < history.length && node; i++) {
      const { word, colors } = history[i];
      node = node.next && node.next[word]
        ? (node.next[word][colors.join('')] || null)
        : null;
    }
  }

  if (node) {
    let rw  = excludeUsed ? node.words.filter(w => !usedSet.has(w)) : [...node.words];
    let top = node.top    ? [...node.top] : [];
    if (excludeUsed) top = top.filter(g => !g.used);
    return { remainingWords: rw, suggestions: top, fromCache: true };
  }

  // Live fallback
  let remaining = [...gameData.meta.solutionWords];
  for (const { word, colors } of history) {
    remaining = filterWords(remaining, word, colors);
  }
  if (excludeUsed) remaining = remaining.filter(w => !usedSet.has(w));

  let guessPool = gameData.meta.allWords;
  if (excludeUsed) guessPool = guessPool.filter(w => !usedSet.has(w));

  const ranked = rankGuesses(guessPool, remaining, 20);
  const suggestions = ranked.map(({ word, score, isSol }) => ({
    w: word, s: parseFloat(score.toFixed(3)), sol: isSol, used: usedSet.has(word)
  }));

  return { remainingWords: remaining, suggestions, fromCache: false };
}

// ── Solver functions (JS port of wordle_solver.py) ─────────────────────────
function getPattern(guess, solution) {
  const pattern  = [0,0,0,0,0];
  const pool     = solution.split('');
  const rem      = guess.split('');
  // Pass 1: greens
  for (let i = 0; i < 5; i++) {
    if (rem[i] === pool[i]) {
      pattern[i] = 2; pool[i] = null; rem[i] = null;
    }
  }
  // Pass 2: yellows (left to right)
  for (let i = 0; i < 5; i++) {
    if (rem[i] === null) continue;
    const idx = pool.indexOf(rem[i]);
    if (idx !== -1) { pattern[i] = 1; pool[idx] = null; }
  }
  return pattern;
}

function filterWords(wordList, guess, pattern) {
  const target = pattern.join('');
  return wordList.filter(w => getPattern(guess, w).join('') === target);
}

function scoreGuess(guess, solutions) {
  if (!solutions.length) return 0;
  const groups = {};
  for (const sol of solutions) {
    const key = getPattern(guess, sol).join('');
    groups[key] = (groups[key] || 0) + 1;
  }
  const n = solutions.length;
  return Object.values(groups).reduce((s, c) => s + c * c, 0) / n;
}

function rankGuesses(guessWords, solutions, topN = 20) {
  const solSet = new Set(solutions);
  const scored = guessWords.map(w => ({ word: w, score: scoreGuess(w, solutions), isSol: solSet.has(w) }));
  scored.sort((a, b) => a.score - b.score);
  return scored.slice(0, topN);
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function setPanel(html) {
  document.getElementById('suggestionsPanel').innerHTML = html;
}

function onModeChange() {
  appMode = document.querySelector('input[name="mode"]:checked').value;
  const isSolver = appMode === 'solver';
  document.getElementById('startWordRow').style.display = isSolver ? 'flex' : 'none';
  if (guessHistory.length > 0) {
    if (isSolver) showSuggestions(guessHistory);
    else          showChallengeScore(guessHistory);
  } else {
    setPanel(`<p class="hint-text">${isSolver
      ? 'Type your first guess and press Enter.'
      : 'Type a guess, enter the colors — see how good your guess was.'}</p>`);
  }
}

function onStartWordChange(val) {
  if (val !== 'custom') {
    document.getElementById('wordInput').value = val.toUpperCase();
  } else {
    document.getElementById('wordInput').value = '';
    document.getElementById('wordInput').focus();
  }
}

function onOptionChange() {
  if (guessHistory.length > 0) {
    if (appMode === 'challenge') showChallengeScore(guessHistory);
    else showSuggestions(guessHistory);
  }
}

function resetGame() {
  guessHistory = []; pendingWord = pendingColors = null;
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 5; c++) {
      const t = document.getElementById(`tile-${r}-${c}`);
      t.textContent = ''; t.className = 'tile'; t.onclick = null;
      delete t.dataset.color;
    }
  }
  document.getElementById('colorRow').style.display  = 'none';
  document.getElementById('colorHint').style.display = 'none';
  document.getElementById('inputRow').style.display  = 'flex';
  onStartWordChange(document.getElementById('startWordSelect').value);
  document.getElementById('wordInput').focus();
  setPanel(`<p class="hint-text">Type your first guess and press Enter.</p>`);
}
</script> </body> </html>
