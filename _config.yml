# -----------------------------------------------------------------------------
# Site settings — Heberle Lab
# -----------------------------------------------------------------------------

lang: en
title: Heberle Lab
first_name: Fred
middle_name: A.
last_name: Heberle
email: fheberle@utk.edu
description: >
  Advanced Membrane Biophysics Group — Department of Chemistry,
  University of Tennessee, Knoxville
keywords: membrane biophysics, lipid rafts, neutron scattering, SANS, cryo-EM, University of Tennessee
logo: /assets/img/logo.png   # Replace with your lab logo if you have one

url: https://www.heberlelab.com
baseurl: ""

# -----------------------------------------------------------------------------
# Open Graph & Twitter card (for link previews)
# -----------------------------------------------------------------------------
og_image: /assets/img/og-preview.jpg  # optional: a preview image for social links

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
repo_theme_light: default
repo_theme_dark: dark

# -----------------------------------------------------------------------------
# Navigation — controls which pages appear in the top menu
# -----------------------------------------------------------------------------
nav_pages:
  - title: Research
    url: /research/
  - title: Domains
    url: /domains/
  - title: People
    url: /people/
  - title: News
    url: /news/
  - title: Friends
    url: /friends/

# -----------------------------------------------------------------------------
# Social links (shown in the footer/sidebar — remove any you don't use)
# -----------------------------------------------------------------------------
github_username:           # your GitHub username, if you create one
scholar_userid:            # your Google Scholar profile ID
orcid_id:                  # your ORCID iD (e.g. 0000-0000-0000-0000)
twitter_username:          # your Twitter/X handle (without @)
linkedin_id:               # your LinkedIn profile ID

# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------
scholar:
  last_name: Heberle
  first_name: [Fred, "Fred A.", "F. A.", "F.A."]

# Sort publications by year (newest first)
enable_publication_thumbnails: true
enable_publication_badges: true

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-scholar

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  news:
    defaults:
      layout: post
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Markdown & highlighting
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# -----------------------------------------------------------------------------
# Jekyll defaults
# -----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:title/
  - scope:
      path: ""
      type: projects
    values:
      layout: page
