/* ── Swedish QWERTY keyboard ────────────────────────────────────── */
const KB_LAYOUT = [
  ['q','w','e','r','t','y','u','i','o','p','å'],
  ['a','s','d','f','g','h','j','k','l','ö','ä'],
  ['⌫','z','x','c','v','b','n','m'],
];

/* ── CEFR ordering ───────────────────────────────────────────────── */
const CEFR_RANK = {A1:1, A2:2, B1:3, B2:4, C1:5, C2:6};

/* ── Build lookups ───────────────────────────────────────────────── */
const VALID_SET  = new Set(VALID_WORDS);
const SOL_MAP    = {};
for (const s of SOLUTIONS) SOL_MAP[s.w] = s;

/* ── Game state ──────────────────────────────────────────────────── */
let solution     = null;  // current word entry {w,c,e,k,g}
let guesses      = [];    // [{word, colors}]
let currentInput = [];    // letters typed so far
let gameOver     = false;
let shareText    = '';
const keyStates  = {};    // letter → 'green'|'yellow'|'gray'

/* ── Pool builder ────────────────────────────────────────────────── */
function getPool() {
  const cefrVal = document.getElementById('cefrSelect').value;
  const poolVal = document.getElementById('poolSelect').value;

  if (poolVal === 'kelly') {
    const maxRank = cefrVal === 'ALL' ? 6 : CEFR_RANK[cefrVal.split('-').pop()];
    return SOLUTIONS.filter(s => CEFR_RANK[s.c] <= maxRank);
  } else {
    // All-words mode: every valid word is a possible solution
    return VALID_WORDS.map(w => SOL_MAP[w] || {w, c:null, e:null, k:null, g:null});
  }
}

/* ── Settings change ─────────────────────────────────────────────── */
function onSettingsChange() {
  const poolVal = document.getElementById('poolSelect').value;
  document.getElementById('cefrSelect').disabled = (poolVal === 'all');
  newGame();
}

/* ── Build board ─────────────────────────────────────────────────── */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'board-row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    board.appendChild(row);
  }
}

/* ── Build keyboard ──────────────────────────────────────────────── */
function buildKeyboard() {
  KB_LAYOUT.forEach((row, ri) => {
    const el = document.getElementById(`kb-row-${ri}`);
    el.innerHTML = '';
    row.forEach(key => {
      const btn = document.createElement('div');
      btn.className = 'kb-key' + (key === '⌫' ? ' wide' : '');
      btn.textContent = key === '⌫' ? '⌫' : key.toUpperCase();
      btn.id = key === '⌫' ? 'key-del' : `key-${key}`;
      btn.addEventListener('click', () => handleKey(key));
      el.appendChild(btn);
    });
  });
}

/* ── Speech synthesis ────────────────────────────────────────────── */
function pronounceWord(word) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang  = 'sv-SE';
  utt.rate  = 0.85;
  speechSynthesis.speak(utt);
}

function speak() {
  if (!solution) return;
  const btn = document.getElementById('btnAudioHint');
  if (btn) {
    btn.classList.add('speaking');
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(solution.w);
    utt.lang  = 'sv-SE'; utt.rate = 0.85;
    utt.onend = () => btn.classList.remove('speaking');
    speechSynthesis.speak(utt);
  } else {
    pronounceWord(solution.w);
  }
}

/* ── Dictionary panel ────────────────────────────────────────────── */
let dictBuilt   = false;
let dictWords   = [];
let dictCefrTab = 'ALL';
let dictSearchTO = null;

function buildDictData() {
  if (dictBuilt) return;
  dictWords = VALID_WORDS.map(w => {
    const s = SOL_MAP[w];
    return { w, c: s?.c || null, e: s?.e || null, k: s?.k || null };
  });
  // Sort by CEFR rank, then alphabetically; non-Kelly words last
  dictWords.sort((a, b) => {
    const ra = a.c ? CEFR_RANK[a.c] : 99;
    const rb = b.c ? CEFR_RANK[b.c] : 99;
    return ra !== rb ? ra - rb : a.w.localeCompare(b.w, 'sv');
  });
  // Build CEFR filter tabs
  const row = document.getElementById('dictCefrRow');
  row.innerHTML = ['ALL','A1','A2','B1','B2','C1','C2'].map(l =>
    `<button class="btn-cefr-tab${l==='ALL'?' active':''}" ` +
    `id="dcefr-${l}" onclick="onDictCefrTab('${l}')">${l==='ALL'?'All':l}</button>`
  ).join('');
  dictBuilt = true;
}

function toggleDict() {
  buildDictData();
  const panel   = document.getElementById('dictPanel');
  const overlay = document.getElementById('dictOverlay');
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open', opening);
  overlay.classList.toggle('open', opening);
  if (opening) renderDictList();
}

function onDictSearch() {
  clearTimeout(dictSearchTO);
  dictSearchTO = setTimeout(renderDictList, 160);
}

function onDictCefrTab(level) {
  dictCefrTab = level;
  document.querySelectorAll('.btn-cefr-tab').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById(`dcefr-${level}`);
  if (tab) tab.classList.add('active');
  renderDictList();
}

function renderDictList() {
  const q  = (document.getElementById('dictSearch').value || '').toLowerCase().trim();
  const lv = dictCefrTab;

  const filtered = dictWords.filter(item => {
    if (lv !== 'ALL' && item.c !== lv) return false;
    if (q) return item.w.includes(q) || (item.e && item.e.toLowerCase().includes(q));
    return true;
  });

  document.getElementById('dictCount').textContent =
    `${filtered.length.toLocaleString()} word${filtered.length !== 1 ? 's' : ''}`;

  document.getElementById('dictList').innerHTML = filtered.map(item => {
    const eng  = item.e
      ? `<span class="dict-eng">"${item.e}"</span>`
      : `<span class="dict-eng none">—</span>`;
    const cefr = item.c
      ? `<span class="badge cefr-${item.c}">${item.c}</span>`
      : '';
    // Escape single quotes in word for onclick safety (Swedish words won't have them, but just in case)
    const ws = item.w.replace(/'/g, "\\'");
    return `<div class="dict-item">` +
      `<button class="btn-dict-audio" onclick="pronounceWord('${ws}')" title="Pronounce">🔊</button>` +
      `<span class="dict-word">${item.w}</span>` +
      eng +
      `<div class="dict-badges">${cefr}</div>` +
      `</div>`;
  }).join('');
}

/* ── Hint box ────────────────────────────────────────────────────── */
function onHintToggle() { updateHintBox(); }

/* ── First-letter toggle (no game reset) ─────────────────────────── */
function onFirstLetterToggle() {
  if (gameOver || !solution) return;
  const on = document.getElementById('firstLetterToggle').checked;
  // Only act if no guesses submitted yet (row 0 still active)
  if (guesses.length > 0) return;
  if (on) {
    const firstLetter = [...solution.w][0];
    currentInput[0] = firstLetter;          // overwrite or insert position 0
    renderInput();
    const tile = document.getElementById('tile-0-0');
    if (tile) { tile.className = 'tile green'; tile.textContent = firstLetter.toUpperCase(); }
  } else {
    // Remove first letter from input and re-render
    currentInput.shift();
    renderInput();
  }
}

function updateHintBox() {
  const show = document.getElementById('hintToggle').checked;
  const box  = document.getElementById('hintBox');
  if (!show || !solution) { box.style.display = 'none'; return; }
  const {e, g, w} = solution;
  const content   = document.getElementById('hintContent');
  if (e) {
    const gramLabel = g === 'en'  ? 'common noun (en)'
                    : g === 'ett' ? 'neuter noun (ett)'
                    : g === 'att' ? 'verb'
                    : '';
    content.innerHTML =
      `<div class="hint-english">"${e}"</div>` +
      (gramLabel ? `<div class="hint-grammar">${gramLabel}</div>` : '');
  } else {
    content.innerHTML = '<div class="hint-no-trans">Translation unavailable</div>';
  }
  box.style.display = 'flex';
}

/* ── New game ────────────────────────────────────────────────────── */
function newGame() {
  const pool = getPool();
  if (!pool.length) {
    showMessage('No words at this level — try a broader filter.', 'error');
    return;
  }
  solution     = pool[Math.floor(Math.random() * pool.length)];
  guesses      = [];
  currentInput = [];
  gameOver     = false;
  shareText    = '';

  buildBoard();
  resetKeyboard();
  document.getElementById('result').style.display  = 'none';
  document.getElementById('message').textContent   = '';
  document.getElementById('message').className     = 'message';

  updateHintBox();
  const audioHint = document.getElementById('btnAudioHint');
  if (audioHint) audioHint.style.display = 'none';

  // First-letter reveal: pre-fill & lock position 0 in green
  if (document.getElementById('firstLetterToggle').checked) {
    const firstLetter = [...solution.w][0];
    currentInput = [firstLetter];
    renderInput();
    const tile = document.getElementById('tile-0-0');
    if (tile) { tile.className = 'tile green'; tile.textContent = firstLetter.toUpperCase(); }
  }
}

/* ── Physical keyboard ───────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'Enter') {
    e.preventDefault();          // stop focused buttons (e.g. New Game) from also firing
    handleKey('enter');
  } else if (e.key === 'Backspace') {
    e.preventDefault();          // stop browser back-navigation
    handleKey('⌫');
  } else if (/^[a-zA-ZåäöÅÄÖ]$/.test(e.key)) {
    handleKey(e.key.toLowerCase());
  }
});

/* ── Key handler ─────────────────────────────────────────────────── */
function handleKey(key) {
  if (gameOver) return;
  key = key.toLowerCase();

  // Lock position 0 only on the very first row
  const lockedLen = (document.getElementById('firstLetterToggle').checked && guesses.length === 0) ? 1 : 0;

  if (key === '⌫') {
    if (currentInput.length > lockedLen) {
      currentInput.pop();
      renderInput();
    }
    return;
  }
  if (key === 'enter') {
    submitGuess();
    return;
  }
  if (!/^[a-zåäö]$/.test(key)) return;
  if (currentInput.length >= 5) return;

  currentInput.push(key);
  renderInput(true);
}

/* ── Render current input onto active row ────────────────────────── */
function renderInput(pop = false) {
  const rowIdx      = guesses.length;
  const firstOn     = document.getElementById('firstLetterToggle').checked && guesses.length === 0;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${rowIdx}-${c}`);
    if (!tile) continue;
    const letter = currentInput[c] || '';
    tile.textContent = letter.toUpperCase();
    // Keep locked first tile styled green
    if (firstOn && c === 0 && letter) {
      tile.className = 'tile green';
    } else {
      tile.className = 'tile' + (letter ? ' filled' : '');
    }
    if (pop && c === currentInput.length - 1 && letter && !(firstOn && c === 0)) {
      tile.classList.add('pop');
      tile.addEventListener('animationend', () => tile.classList.remove('pop'), {once:true});
    }
  }
}

/* ── Submit a guess ──────────────────────────────────────────────── */
function submitGuess() {
  if (currentInput.length < 5) {
    showMessage('Not enough letters', 'error');
    shakeRow(guesses.length);
    return;
  }
  const word = currentInput.join('');
  if (!VALID_SET.has(word)) {
    showMessage('Not in word list', 'error');
    shakeRow(guesses.length);
    return;
  }

  const colors = scoreGuess(word, solution.w);
  guesses.push({word, colors});
  currentInput = [];

  const rowIdx = guesses.length - 1;
  revealRow(rowIdx, word, colors);

  const delay = 5 * 120 + 300;
  const won  = colors.every(c => c === 2);
  const lost = !won && guesses.length === 6;

  if (won || lost) {
    gameOver = true;
    setTimeout(() => {
      if (won) {
        bounceRow(rowIdx);
        showMessage(wonMessage(guesses.length), 'success');
      } else {
        showMessage('', '');
      }
      buildShareText(won);
      showResult(won);
    }, delay);
  } else {
    showMessage('');
  }
}

/* ── Score a guess (standard Wordle algorithm) ───────────────────── */
function scoreGuess(guess, answer) {
  const colors = Array(5).fill(0);
  const used   = Array(5).fill(false);
  const gArr   = [...guess];
  const aArr   = [...answer];
  // Pass 1: greens
  for (let i = 0; i < 5; i++) {
    if (gArr[i] === aArr[i]) { colors[i] = 2; used[i] = true; }
  }
  // Pass 2: yellows
  for (let i = 0; i < 5; i++) {
    if (colors[i] === 2) continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && gArr[i] === aArr[j]) { colors[i] = 1; used[j] = true; break; }
    }
  }
  return colors;
}

/* ── Reveal tiles with flip delay ────────────────────────────────── */
function revealRow(rowIdx, word, colors) {
  const CLS = ['gray', 'yellow', 'green'];
  [...word].forEach((letter, i) => {
    const tile = document.getElementById(`tile-${rowIdx}-${i}`);
    setTimeout(() => {
      tile.textContent = letter.toUpperCase();
      tile.className   = `tile ${CLS[colors[i]]}`;
    }, i * 120 + 200);
  });
  // Update keyboard after last tile reveals
  setTimeout(() => updateKeyboard(word, colors), 5 * 120 + 200);
}

/* ── Keyboard coloring ───────────────────────────────────────────── */
const CLS_RANK = {gray:1, yellow:2, green:3};

function updateKeyboard(word, colors) {
  [...word].forEach((letter, i) => {
    const cls = ['gray','yellow','green'][colors[i]];
    if (!keyStates[letter] || CLS_RANK[cls] > CLS_RANK[keyStates[letter]]) {
      keyStates[letter] = cls;
      const el = document.getElementById(`key-${letter}`);
      if (el) el.className = `kb-key ${cls}`;
    }
  });
}

function resetKeyboard() {
  for (const k in keyStates) delete keyStates[k];
  document.querySelectorAll('.kb-key[id^="key-"]').forEach(el => {
    const base = el.classList.contains('wide') ? 'kb-key wide' : 'kb-key';
    el.className = base;
  });
}

/* ── Result panel ────────────────────────────────────────────────── */
function showResult(won) {
  const {w, c, e, k, g} = solution;

  document.getElementById('resultOutcome').textContent =
    won ? `You got it in ${guesses.length}!` : 'Better luck next time';
  document.getElementById('resultOutcome').className =
    `result-outcome ${won ? 'won' : 'lost'}`;

  document.getElementById('resultWord').textContent = w.toUpperCase();

  // Grammar line: "en lampa", "ett träd", "att gå", or blank
  const gramEl = document.getElementById('resultGrammar');
  if (g && (g === 'en' || g === 'ett' || g === 'att')) {
    gramEl.textContent = `${g} ${w}`;
    gramEl.style.display = '';
  } else {
    gramEl.style.display = 'none';
  }

  // English translation
  const engEl = document.getElementById('resultEnglish');
  if (e) {
    engEl.textContent = `"${e}"`;
    engEl.style.display = '';
  } else {
    engEl.style.display = 'none';
  }

  // Badges: CEFR + word class
  const metaEl = document.getElementById('resultMeta');
  metaEl.innerHTML = '';
  if (c) {
    const b = document.createElement('span');
    b.className = `badge cefr-${c}`;
    b.textContent = c;
    metaEl.appendChild(b);
  }
  if (k) {
    const b = document.createElement('span');
    b.className = 'badge badge-class';
    b.textContent = k;
    metaEl.appendChild(b);
  }

  document.getElementById('result').style.display = 'block';

  // Reveal the hint-box audio button now that the answer is shown
  const audioHint = document.getElementById('btnAudioHint');
  if (audioHint) audioHint.style.display = '';
}

/* ── Share ───────────────────────────────────────────────────────── */
function buildShareText(won) {
  const EMOJI = ['⬛','🟨','🟩'];
  const header = `Ordlebot ${won ? guesses.length : 'X'}/6`;
  shareText = header + '\n' +
    guesses.map(g => g.colors.map(c => EMOJI[c]).join('')).join('\n');
}

function shareResult() {
  if (!shareText) return;
  navigator.clipboard.writeText(shareText)
    .then(()  => showMessage('Copied to clipboard!', 'success'))
    .catch(()  => showMessage(shareText.replace(/\n/g,' ')));
}

/* ── Animations & helpers ────────────────────────────────────────── */
function shakeRow(rowIdx) {
  const row = document.getElementById(`row-${rowIdx}`);
  if (!row) return;
  row.classList.add('shake');
  row.addEventListener('animationend', () => row.classList.remove('shake'), {once:true});
}

function bounceRow(rowIdx) {
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${rowIdx}-${c}`);
    if (!tile) continue;
    setTimeout(() => {
      tile.classList.add('bounce');
      tile.addEventListener('animationend', () => tile.classList.remove('bounce'), {once:true});
    }, c * 80);
  }
}

function showMessage(msg, type) {
  const el = document.getElementById('message');
  el.textContent = msg;
  el.className   = 'message' + (type ? ` ${type}` : '');
}

const WON_MSGS = ['','Genius! 🧠','Excellent! ✨','Great! 👏','Good! 👍','Phew! 😅','Lucky! 🍀'];
function wonMessage(n) { return WON_MSGS[n] || 'Nice!'; }

/* ── Init ────────────────────────────────────────────────────────── */
buildKeyboard();
newGame();
</script> </body> </html>
